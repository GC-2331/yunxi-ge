<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的爱情时光</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f7fa;
            position: relative;
            overflow-x: hidden;
        }

        /* 背景装饰 */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(#ffd700 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.3;
            z-index: -1;
        }

        /* 顶部背景 */
        .header {
            height: 300px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23ffffff" fill-opacity="0.1" d="M0,96L48,117.3C96,139,192,181,288,181.3C384,181,480,139,576,122.7C672,107,768,117,864,149.3C960,181,1056,235,1152,234.7C1248,235,1344,181,1392,154.7L1440,128L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z"></path></svg>');
            background-size: cover;
            background-position: bottom;
        }

        /* 头像区域 */
        .avatar-container {
            display: flex;
            align-items: center;
            gap: 80px;
            position: relative;
            z-index: 2;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .avatar img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
        }

        .avatar-name {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .heart {
            width: 40px;
            height: 40px;
            background-color: #ff4757;
            position: relative;
            transform: rotate(-45deg);
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        .heart::before,
        .heart::after {
            content: '';
            width: 40px;
            height: 40px;
            background-color: #ff4757;
            border-radius: 50%;
            position: absolute;
        }

        .heart::before {
            top: -20px;
            left: 0;
        }

        .heart::after {
            top: 0;
            left: 20px;
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: rotate(-45deg) scale(1);
            }
            50% {
                transform: rotate(-45deg) scale(1.1);
            }
        }

        /* 内容区域 */
        .content {
            max-width: 1200px;
            margin: -50px auto 0;
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 40px;
            position: relative;
            z-index: 1;
        }

        /* 时间计数器 */
        .time-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .time-title {
            font-size: 18px;
            color: #3498db;
            margin-bottom: 10px;
        }

        .time-counter {
            font-size: 28px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .spring-festival {
            font-size: 14px;
            color: #7f8c8d;
        }

        /* 功能按钮 */
        .feature-buttons {
            display: flex;
            justify-content: space-around;
            margin-bottom: 40px;
            padding: 20px 0;
            border-bottom: 1px solid #ecf0f1;
        }

        .feature-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .feature-btn:hover {
            transform: translateY(-5px);
        }

        .feature-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #3498db;
        }

        .feature-text {
            font-size: 14px;
            color: #2c3e50;
        }

        /* 标签 */
        .tags {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tag {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tag:nth-child(1) { background-color: #ff6b6b; color: white; }
        .tag:nth-child(2) { background-color: #4ecdc4; color: white; }
        .tag:nth-child(3) { background-color: #45b7d1; color: white; }
        .tag:nth-child(4) { background-color: #96ceb4; color: white; }
        .tag:nth-child(5) { background-color: #ffeaa7; color: #2c3e50; }
        .tag:nth-child(6) { background-color: #dfe6e9; color: #2c3e50; }

        .tag:hover {
            transform: scale(1.05);
        }

        /* 地点标题 */
        .location-title {
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        /* 图片网格 */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .photo-item {
            background-color: #f8f9fa;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .photo-item:hover {
            transform: translateY(-5px);
        }

        .photo-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .photo-info {
            padding: 15px;
        }

        .photo-title {
            font-size: 14px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .photo-date {
            font-size: 12px;
            color: #7f8c8d;
        }

        /* 底部装饰 */
        .footer {
            text-align: center;
            padding: 30px 0;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            margin-top: 40px;
            position: relative;
        }

        .footer::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 0;
            right: 0;
            height: 20px;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23ffffff" fill-opacity="1" d="M0,224L48,218.7C96,213,192,203,288,181.3C384,160,480,128,576,138.7C672,149,768,203,864,213.3C960,224,1056,192,1152,176C1248,160,1344,160,1392,160L1440,160L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
            background-size: cover;
            background-position: top;
        }

        .footer-text {
            font-size: 14px;
            line-height: 1.5;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .content {
                margin: -30px 20px 0;
                padding: 20px;
            }

            .avatar-container {
                gap: 40px;
            }

            .avatar {
                width: 80px;
                height: 80px;
            }

            .avatar img {
                width: 60px;
                height: 60px;
            }

            .time-counter {
                font-size: 20px;
            }

            .feature-buttons {
                flex-direction: column;
                align-items: center;
                gap: 20px;
            }

            .photo-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部背景 -->
    <div class="header">
        <div class="avatar-container">
            <div class="avatar">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=cartoon%20girl%20avatar%20with%20blue%20dress&image_size=square" alt="Sara">
                <div class="avatar-name">Sara</div>
            </div>
            <div class="heart"></div>
            <div class="avatar">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=cartoon%20boy%20avatar%20with%20red%20glasses&image_size=square" alt="Abby">
                <div class="avatar-name">Abby</div>
            </div>
        </div>
    </div>

    <!-- 内容区域 -->
    <div class="content">
        <!-- 时间计数器 -->
        <div class="time-section">
            <div class="time-title">这是我们一起走过的</div>
            <div class="time-counter" id="loveTime">第 9 年 2 月 16 日 21 时 20 分 11 秒</div>
            <div class="spring-festival">春节倒计时: -55 天 -9 时 -20 分 -11 秒</div>
        </div>

        <!-- 功能按钮 -->
        <div class="feature-buttons">
            <div class="feature-btn">
                <div class="feature-icon">💑</div>
                <div class="feature-text">点点滴滴</div>
                <div class="feature-subtext">珍藏美好瞬间</div>
            </div>
            <div class="feature-btn">
                <div class="feature-icon">📸</div>
                <div class="feature-text">时光相册</div>
                <div class="feature-subtext">记录美好回忆</div>
            </div>
            <div class="feature-btn">
                <div class="feature-icon">💌</div>
                <div class="feature-text">祝福板</div>
                <div class="feature-subtext">写下我们的愿望</div>
            </div>
        </div>

        <!-- 标签 -->
        <div class="tags">
            <div class="tag">九寨沟</div>
            <div class="tag">仙池</div>
            <div class="tag">珍珠滩</div>
            <div class="tag">瀑布</div>
            <div class="tag">景色</div>
            <div class="tag">路上</div>
        </div>

        <!-- 地点标题 -->
        <div class="location-title">九寨沟</div>

        <!-- 图片网格 -->
        <div class="photo-grid">
            <div class="photo-item">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=jiuzhaigou%20valley%20clear%20blue%20water%20with%20trees%20underwater&image_size=landscape_4_3" alt="彩池">
                <div class="photo-info">
                    <div class="photo-title">彩池</div>
                    <div class="photo-date">2024-09-12</div>
                </div>
            </div>
            <div class="photo-item">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=jiuzhaigou%20valley%20waterfall%20blue%20water%20flowing%20through%20forest&image_size=landscape_4_3" alt="双龙海瀑布">
                <div class="photo-info">
                    <div class="photo-title">双龙海瀑布</div>
                    <div class="photo-date">2024-09-12</div>
                </div>
            </div>
            <div class="photo-item">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=jiuzhaigou%20valley%20waterfall%20with%20rainbow%20in%20mist&image_size=landscape_4_3" alt="落日朗瀑布">
                <div class="photo-info">
                    <div class="photo-title">落日朗瀑布</div>
                    <div class="photo-date">2024-09-12</div>
                </div>
            </div>
            <div class="photo-item">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=jiuzhaigou%20valley%20waterfall%20in%20forest%20with%20green%20trees&image_size=landscape_4_3" alt="熊猫海瀑布">
                <div class="photo-info">
                    <div class="photo-title">熊猫海瀑布</div>
                    <div class="photo-date">2024-09-12</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部 -->
    <div class="footer">
        <div class="footer-text">
            <p>相爱的力量</p>
            <p>本作品由 Sara 和 Abby 共同创作</p>
            <p>记录我们的美好时光</p>
        </div>
    </div>

    <script>
        // 时间计算函数
        function updateLoveTime() {
            // 假设相恋开始时间为 2017-02-16 21:20:11
            const startDate = new Date('2017-02-16 21:20:11');
            const now = new Date();
            const diff = now - startDate;

            // 计算年、月、日、时、分、秒
            const years = Math.floor(diff / (365 * 24 * 60 * 60 * 1000));
            const months = Math.floor((diff % (365 * 24 * 60 * 60 * 1000)) / (30 * 24 * 60 * 60 * 1000));
            const days = Math.floor((diff % (30 * 24 * 60 * 60 * 1000)) / (24 * 60 * 60 * 1000));
            const hours = Math.floor((diff % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000));
            const minutes = Math.floor((diff % (60 * 60 * 1000)) / (60 * 1000));
            const seconds = Math.floor((diff % (60 * 1000)) / 1000);

            // 更新显示
            document.getElementById('loveTime').textContent = `第 ${years} 年 ${months} 月 ${days} 日 ${hours} 时 ${minutes} 分 ${seconds} 秒`;
        }

        // 初始化和定时更新
        updateLoveTime();
        setInterval(updateLoveTime, 1000);

        // 功能按钮点击事件
        document.querySelectorAll('.feature-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const text = this.querySelector('.feature-text').textContent;
                alert(`${text} 功能开发中...`);
            });
        });

        // 标签点击事件
        document.querySelectorAll('.tag').forEach(tag => {
            tag.addEventListener('click', function() {
                const tagText = this.textContent;
                alert(`正在查看 "${tagText}" 相关内容...`);
            });
        });

        // 图片点击事件
        document.querySelectorAll('.photo-item').forEach(item => {
            item.addEventListener('click', function() {
                const title = this.querySelector('.photo-title').textContent;
                alert(`查看 "${title}" 大图...`);
            });
        });
    </script>
</body>
</html>
